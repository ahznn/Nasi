[Rainmeter]
Update=1000
AccurateText=1
ContextTitle=Settings
ContextAction=[!ActivateConfig "#RootConfig#" "Settings.ini"][!Move (#CurrentConfigX#+(#S#*#SkinWidth#)+10) #CurrentConfigY# "#RootConfig#"]

[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules/Background.inc
@Include4=#@#Players/#Plugin#.inc
SkinWidth =650
SkinHeight=720

; Change only this line to switch images
CurrentImage=irokagu.png

[ImageMeter]
Meter=Image
ImageName=#@#Images\#CurrentImage#
DynamicVariables=1
PreserveAspectRatio=2
W=630
H=700
X=10
Y=10