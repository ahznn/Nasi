; ----------------------------------------- Background Modifiers

[Section3]
Meter=String
MeterStyle=Section
FontColor =#Accent3#
Text =< General Options >

[Scale]
Meter=String
MeterStyle    =OptionIT
Text =Scale ... #Scale#

[ScaleInput]
