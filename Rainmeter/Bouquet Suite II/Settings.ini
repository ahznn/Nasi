Plugin   =InputText
FontFace =#Font#
FontSize =(#S#*#FontSZ#)
FontColor=255,255,255
Command1 =[!WriteKeyValue Variables "Scale" "$UserInput$" "#@#Variables.inc"][!Refresh *]
DefaultValue=#Scale#
SolidColor  =0,0,0
InputNumber =1
X=[Scale:X]
Y=[Scale:Y]
W=[Scale:W]
H=[Scale:H]

[Border]
Meter=String
MeterStyle=OptionYN
Text =Border ... #Border#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#Border#=1 ? 0:1)" "#@#Variables.inc"][!Refresh *]

[ShadowR]
