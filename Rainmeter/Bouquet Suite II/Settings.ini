[Rainmeter]
Update        =-1
AccurateText  =1
ContextTitle  =Variables
ContextAction =["#@#Variables.inc"]
ContextTitle2 =Styles
ContextAction2=["#@#Styles.inc"]
ContextTitle3 =Resources Folder
ContextAction3=["#@#"]
SkinHeight    =(#S#*#SkinHeight#+(#ShadowR#*2))

; ----------------------------------------- Inclusions

[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules\Background.inc
SkinWidth =300
SkinHeight=260
MedPlayer =Web

ScrollPrcnt=10
; Percentage of height to scroll
ScrollH    =400
;Total Height to scroll

Accent1=120,220,140
Accent2=240,240,160
Accent3=140,140,220

YColor =080,200,080
NColor =100,100,200

; ----------------------------------------- Background

[Background]
Meter =Shape
Shape =Rectangle 0,0,(#SkinWidth#-00),(#SkinHeight#-00) | Extend Mods | StrokeWidth 0 | FillColor #ColorBG#,#Alpha#
Shape2=Rectangle 5,5,(#SkinWidth#-10),(#SkinHeight#-10) | Extend Mods | StrokeWidth 2 | FillColor #ColorBG#,0000000 | StrokeColor #ColorA2#,(#Alpha#/4*#Border#)
Mods  =Scale #S#,#S#,0,0

MouseScrollDownAction=[!SetOption Scroll "Formula" "(Clamp((#S#*([Scroll]+#ScrollPrcnt#)), 0, 100))"][!WriteKeyValue Scroll "Formula" "([Scroll]+([Scroll]=100 ? 0:#ScrollPrcnt#))"][!Update][!Redraw]
MouseScrollUpAction  =[!SetOption Scroll "Formula" "(Clamp((#S#*([Scroll]-#ScrollPrcnt#)), 0, 100))"][!WriteKeyValue Scroll "Formula" "([Scroll]-([Scroll]=000 ? 0:#ScrollPrcnt#))"][!Update][!Redraw]
MouseActionCursor=0
DynamicVariables =1
UpdateDivider    =-1

[ScrollBar]
Meter =Shape
Shape =Rectangle 00,0,11,100 | Extend Mods | FillColor 0,0,0,1
Shape2=Rectangle 04,0,02,100 | Extend Mods | FillColor #ColorFG#,#Alpha#
Mods  =StrokeWidth 0 | Scale #S#,#S#,0,0
X     =(#S#*(#SkinWidth#-10)+#ShadowR#)
Y     =(#S#*([Scroll]*((#SkinHeight#-112)/100))+6+#ShadowR#)

LeftMouseDownAction=[!CommandMeasure Drag "Start"]
DynamicVariables   =1

; ----------------------------------------- Close

[CloseShape]
Meter =Shape
Group =Close
Shape =Rectangle (#S#*2),(#S#*2),14,14 | Scale #S#,#S#,0,0 | StrokeWidth 0 | FillColor 240,100,110
Shape2=Rectangle (#S#*0),(#S#*0),18,18 | Scale #S#,#S#,0,0 | StrokeWidth 0 | FillColor 240,100,110
Shape3=Rectangle (#S#*1),(#S#*1),16,16 | Scale #S#,#S#,0,0 | StrokeWidth 0 | FillColor #ColorBG#
Shape4=Combine Shape3 | XOR Shape
Hidden=1
X     =(#S#*(#SkinWidth#-37)+#ShadowR#)
Y     =(#S#*17+#ShadowR#)
DynamicVariables=1

[CloseText]
Meter         =String
Group         =Close
Text          =X
InlineSetting =Face  | Siji
InlineSetting2=Color | #ColorFG#
InlineSetting3=Size  | (#S#*8)
StringAlign   =CenterCenter
SolidColor    =0,0,0,1
Antialias     =#AA#
X    =(#S#*09)r
Y    =(#S#*10)r
W    =(#S#*18)
H    =(#S#*18)

MouseOverAction  =[!ShowMeter CloseShape][!SetOption #CurrentSection# "InlineSetting2" "Color|255,255,255"][!UpdateMeterGroup Close][!Redraw]
MouseLeaveAction =[!HideMeter CloseShape][!SetOption #CurrentSection# "InlineSetting2" "Color|#ColorFG#  "][!UpdateMeterGroup Close][!Redraw]
LeftMouseUpAction=[!WriteKeyValue Scroll "Formula" "0"][!DeactivateConfig]

; ----------------------------------------- Media Players

[Section1]
Meter=String
MeterStyle=Section
FontColor =#Accent1#
Text =< Media Players -- > 
Y    =(#S#*20-(([Scroll]/100)*#ScrollH#)+#ShadowR#)
DynamicVariables=1

[AIMP]
Meter=String
MeterStyle=OptionP
X    =(#S#*35)
Y    =(#S#*30)r

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "NowPlaying" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "AIMP" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[Foobar2K]
Meter=String
MeterStyle=OptionP

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "NowPlaying" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "CAD" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[Winamp]
Meter=String
MeterStyle=OptionP

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "NowPlaying" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "Winamp" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[MediaMonkey]
Meter=String
MeterStyle=OptionP
X   =(#S#*57)r
W   =(#S#*60)

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "NowPlaying" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "CAD" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[iTunes]
