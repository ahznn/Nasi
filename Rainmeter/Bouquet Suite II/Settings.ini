FontSize =(#S#*#FontSZ#)
FontColor=255,255,255
Command1 =[!WriteKeyValue Variables "ColorBG" "$UserInput$" "#@#Variables.inc"][!Refresh *]
DefaultValue=#ColorBG#
SolidColor  =0,0,0
InputLimit  =11
X=[ColorBG:X]
Y=[ColorBG:Y]
W=[ColorBG:W]
H=[ColorBG:H]

[ColorA1Square]
Meter=Shape
MeterStyle=Swatch
Shape=Rectangle 0,0,(#FontSZ#+2),(#FontSZ#+2) | Extend Mods | FillColor #ColorA1#

[ColorA1]
