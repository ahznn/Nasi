LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "NowPlaying" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "iTunes" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[Spotify]
Meter=String
MeterStyle=OptionP

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "Spotify" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "Spotify" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[Web]
Meter=String
MeterStyle=OptionP

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "Web" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "Web" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[MusicBee]
Meter=String
MeterStyle=OptionP
X   =(#S#*57)r
W   =(#S#*60)

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "NowPlaying" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "MusicBee" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[GPMDP]
Meter=String
MeterStyle=OptionP
X    =(#S#*35)
Y    =(#S#*20)r

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "GPMDP" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "GPMDP" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[WMP]
Meter=String
MeterStyle=OptionP

LeftMouseUpAction=[!WriteKeyValue Variables "Plugin" "NowPlaying" "#@#Variables.inc"][!WriteKeyValue Variables "Player" "WMP" "#@#Variables.inc"][!WriteKeyValue Variables "MedPlayer" "#CurrentSection#"][!Refresh "#RootConfig#\Media"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

; ----------------------------------------- Colors

[Section2]
Meter=String
MeterStyle=Section
FontColor =#Accent2#
Text =< Colors ------- >
Y    =(#S#*20)r

[ColorFGSquare]
Meter=Shape
MeterStyle=Swatch
Shape=Rectangle 0,0,(#FontSZ#+2),(#FontSZ#+2) | Extend Mods | FillColor #ColorFG#
Y    =(#S#*25)r

[ColorFG]
Meter=String
MeterStyle    =OptionIT
Text =Foreground Color ... #ColorFG#
X    =(#S#*5)R
Y    =r
W    =(#S#*(#SkinWidth#-90))

[ColorFGInput]
Measure  =Plugin
Plugin   =InputText
FontFace =#Font#
FontSize =(#S#*#FontSZ#)
FontColor=255,255,255
Command1 =[!WriteKeyValue Variables "ColorFG" "$UserInput$" "#@#Variables.inc"][!Refresh *]
DefaultValue=#ColorFG#
SolidColor  =0,0,0
InputLimit  =11
X=[ColorFG:X]
Y=[ColorFG:Y]
W=[ColorFG:W]
H=[ColorFG:H]

[ColorBGSquare]
Meter =Shape
MeterStyle=Swatch
Shape =Rectangle 0,0,(#FontSZ#+2),(#FontSZ#+2) | Extend Mods | FillColor #ColorFG#
Shape2=Rectangle 1,1,(#FontSZ#+0),(#FontSZ#+0) | Extend Mods | FillColor #ColorBG#

[ColorBG]
Meter=String
MeterStyle    =OptionIT
Text =Background Color ... #ColorBG#
X    =(#S#*5)R
Y    =r
W    =(#S#*(#SkinWidth#-90))

[ColorBGInput]
