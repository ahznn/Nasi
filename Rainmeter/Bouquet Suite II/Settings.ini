MeterStyle=OptionYN
Text =Sectioned Background ... #BG#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#BG#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Power"][!Refresh]

; ----------------------------------------- Media 

[Section5]
Meter=String
MeterStyle=Section
FontColor =#Accent2#
Text =< Media -------- >

[Align]
Meter=String
MeterStyle=OptionIT
Text =Alignment ... #Align#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "[AlignString]" "#@#Variables.inc"][!Refresh "#RootConfig#\Media"][!Refresh]

[AlignCalc]
Measure =String
String  =#Align#

IfMatch =Left
IfMatch2=Center
IfMatch3=Right
IfMatchAction =[!SetOption AlignString "String" "Center"]
IfMatchAction2=[!SetOption AlignString "String" "Right"]
IfMatchAction3=[!SetOption AlignString "String" "Left"]

[AlignString]
Measure=String
String =

[Album]
Meter=String
MeterStyle=OptionYN
Text =Album Text ... #Album#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#Album#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Media"][!Refresh]

[CoverP]
Meter=String
MeterStyle=OptionYN
Text =Cover Padding ... #CoverP#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#CoverP#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Media\Cover"][!Refresh]

[ProgType]
Meter=String
MeterStyle=OptionYN
Text =Progress Bar Type ... #ProgType#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#ProgType#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Media"][!Refresh]


[Vis]
Meter=String
MeterStyle=OptionYN
Text =Visualizer ... #Vis#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#Vis#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Media"][!Refresh]

[BarW]
Meter=String
MeterStyle    =OptionIT
Text =Visualizer Bar Width ... #BarW#

[BarWInput]
Measure  =Plugin
Plugin   =InputText
FontFace =#Font#
FontSize =(#S#*#FontSZ#)
FontColor=255,255,255
Command1 =[!WriteKeyValue Variables "BarW" "$UserInput$" "#@#Variables.inc"][!Refresh "#RootConfig#\Media"][!Refresh]
DefaultValue=#BarW#
SolidColor  =0,0,0
InputNumber =1
InputLimit  =1
X=[BarW:X]
Y=[BarW:Y]
W=[BarW:W]
H=[BarW:H]

[Smooth]
Meter=String
MeterStyle=OptionYN
Text =Visualizer Smoothing ... #Smooth#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#Smooth#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Media"][!Refresh]

; ----------------------------------------- Scrolling

[Scroll]
Measure =Calc
Formula =0

[ScrollBorder]
Meter =Shape
Shape =Rectangle 0,0,#SkinWidth#,6     | Extend Mods | FillColor #ColorBG#,(#Alpha#=255 ? 255:0)
Shape2=Rectangle 4,4,(#SkinWidth#-8),2 | Extend Mods | FillColor #ColorA2#,(#Alpha#=255 ? (#Alpha#/4):0)

Shape3=Rectangle 0,(#SkinHeight#-6),#SkinWidth#,6     | Extend Mods | FillColor #ColorBG#,(#Alpha#=255 ? 255:0)
Shape4=Rectangle 4,(#SkinHeight#-6),(#SkinWidth#-8),2 | Extend Mods | FillColor #ColorA2#,(#Alpha#=255 ? (#Alpha#/4):0)
Mods  =Scale #S#,#S#,0,0 | StrokeWidth 0
Hidden=(#Border#=1 ? 0:1)
X     =(#S#*#ShadowR#)
Y     =(#S#*#ShadowR#)

[Drag]
Measure=Plugin
Plugin =Mouse
Group  =Progress
LeftMouseDragAction=[!SetOption Scroll "Formula" "Clamp((#S#*($MouseY$/((#SkinHeight#-100)/100))-(#ScrollH#/10)),0,100)"][!UpdateMeasure Scroll][!Update][!Redraw]
LeftMouseUpAction  =[!WriteKeyValue Scroll "Formula" "[Scroll]"][!CommandMeasure Drag "Stop"]
RelativeToSkin     =1
RequireDragging    =1
