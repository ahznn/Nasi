FontFace =#Font#
FontSize =(#S#*#FontSZ#)
FontColor=255,255,255
Command1 =[!WriteKeyValue Variables "ColorA1" "$UserInput$" "#@#Variables.inc"][!Refresh *]
DefaultValue=#ColorA1#
SolidColor  =0,0,0
InputLimit  =11
X=[ColorA1:X]
Y=[ColorA1:Y]
W=[ColorA1:W]
H=[ColorA1:H]

[ColorA2Square]
