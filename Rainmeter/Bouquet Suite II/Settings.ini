MeterStyle=OptionYN
Text =AM/PM Indicator ... #AMPM#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#AMPM#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Power"][!Refresh]

[BG]
