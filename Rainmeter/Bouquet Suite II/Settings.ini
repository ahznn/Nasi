MeterStyle=OptionYN
Text =24 Hour Time ... #24HR#

LeftMouseUpAction=[!WriteKeyValue Variables "#CurrentSection#" "(#24HR#=1 ? 0:1)" "#@#Variables.inc"][!Refresh "#RootConfig#\Power"][!Refresh]

[AMPM]
