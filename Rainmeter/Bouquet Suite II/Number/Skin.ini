[Rainmeter]
Update=500
AccurateText=1
ContextTitle=Settings
ContextAction=[!ActivateConfig "#RootConfig#" "Settings.ini"][!Move (#CurrentConfigX#+(#S#*#SkinWidth#)+10) #CurrentConfigY# "#RootConfig#"]

[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules/Background.inc
@Include4=#@#Players/#Plugin#.inc
SkinWidth=420
SkinHeight=140

[RandomNumber]
Measure=Calc
Formula=(TRUNC(Random/e*pi**25))+99999999999999999
UpdateRandom=1
HighBound=999999
LowBound=0
RegExpSubstitute=1
Substitute="^.(....)(....)(....)(....).*$":"\1 \2 \3 \4"
UpdateDivider=10

[MeterNumber]
Meter=String
MeasureName=RandomNumber
StringAlign=CenterCenter
FontColor=#ColorA1#
FontFace=#Font#
FontSize=20
X=200
Y=40

