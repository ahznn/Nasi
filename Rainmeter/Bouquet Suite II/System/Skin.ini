[Rainmeter]
Update=1000
AccurateText=1
BackgroundMode=2
SolidColor=0,0,0,1

; -------------------------------------------------------------
; INCLUDE THE SAME STYLES & VARIABLES AS Skin.ini
; -------------------------------------------------------------
[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules/Background.inc

; Override or add any extra variables if needed (keep original spacing)
SkinWidth=355
SkinHeight=175

; -------------------------------------------------------------
; MEASURES (unchanged – CPU, RAM, GPU, names, etc.)
; -------------------------------------------------------------
[mCPU]
Measure=CPU

[mRAM]
Measure=PhysicalMemory

[mRAMTotal]
Measure=PhysicalMemory
Total=1

[mRAMPercent]
Measure=Calc
Formula=(mRAM / mRAMTotal) * 100
MinValue=0
MaxValue=100

[mRAMTotalGB]
Measure=Calc
Formula=mRAMTotal / 1073741824
NumOfDecimals=1

[mGPU]
Measure=Plugin
Plugin=UsageMonitor
Alias=GPU
Index=0

[mGPUPercent]
Measure=Calc
Formula=mGPU
MinValue=0
MaxValue=100

[mCPUName]
Measure=Registry
RegHKey=HKEY_LOCAL_MACHINE
RegKey=HARDWARE\DESCRIPTION\System\CentralProcessor\0
RegValue=ProcessorNameString
RegExpSubstitute=1
Substitute="\(R\)":"","\(TM\)":"","\(tm\)":"","Intel Core ":"","AMD ":"","Processor":"","CPU ":"","@ .*":"","\d+-Core ":"","  ":" ","^\s+|\s+$":""

[mCPUClock]
Measure=Registry
RegHKey=HKEY_LOCAL_MACHINE
RegKey=HARDWARE\DESCRIPTION\System\CentralProcessor\0
RegValue=~MHz

[mGPUName]
Measure=Registry
RegHKey=HKEY_LOCAL_MACHINE
RegKey=SYSTEM\CurrentControlSet\Control\Class\{4d36e968-e325-11ce-bfc1-08002be10318}\0000
RegValue=DriverDesc
RegExpSubstitute=1
Substitute="NVIDIA GeForce ":"","AMD Radeon ":"","Intel\(R\) ":"Intel ","^\s+|\s+$":""

; RAM speed (optional – keep your VBScript method)
[mRAMSpeedScript]
Measure=Plugin
Plugin=RunCommand
Program=cscript
Parameter=//NoLogo "#CURRENTPATH#GetRAMSpeed.vbs"
State=Hide
Timeout=5000
UpdateDivider=-1
FinishAction=[!UpdateMeasure mRAMSpeedParse][!UpdateMeter *][!Redraw]

[mRAMSpeedParse]
Measure=Plugin
Plugin=WebParser
URL=file://#CURRENTPATH#raminfo.txt
RegExp=(.+)
ForceReload=1
UpdateRate=5

[mRAMSpeed]
Measure=Plugin
Plugin=WebParser
URL=[mRAMSpeedParse]
StringIndex=1

; -------------------------------------------------------------
; METERS – using Skin.ini’s styles
; -------------------------------------------------------------

; --- Title (like "Top GPU Processes:" but here "sysmon.exe")
[Title]
Meter=String
MeterStyle=Process
Text=>.<
X=(#S# + 15)
Y=(#S# + 15)
InlineSetting=Underline
LeftMouseUpAction=["taskmgr.exe"]
ToolTipText=Open Task Manager

; --- CPU line
[LabelCPU]
Meter=String
MeterStyle=Process
MeasureName=mCPUName
MeasureName2=mCPUClock
Text=CPU : %1 @ %2 MHz
X=(#S# + 15)
Y=(#S# + 40)

[ValueCPU]
Meter=String
MeterStyle=Process
MeasureName=mCPU
Text=%1%
StringAlign=Right
X=(#SkinWidth# - #S# - 15)
Y=0r

[BarCPU]
Meter=Bar
MeasureName=mCPU
X=(#S# + 15)
Y=(#S# + 60)
W=(#SkinWidth# - #S# - 30)
H=10
BarColor=#ColorA1#          ; use accent from Variables.inc
SolidColor=#ColorBG#             ; use background colour
BarOrientation=Horizontal

; --- RAM line
[LabelRAM]
Meter=String
MeterStyle=Process
MeasureName=mRAMSpeed
MeasureName2=mRAMTotalGB
Text=MEM : %1 : %2 GB
X=(#S# + 15)
Y=(#S# + 80)

[ValueRAM]
Meter=String
MeterStyle=Process
MeasureName=mRAMPercent
Text=%1%
StringAlign=Right
NumOfDecimals=1
X=(#SkinWidth# - #S# - 15)
Y=0r

[BarRAM]
Meter=Bar
MeasureName=mRAM
X=(#S# + 15)
Y=(#S# + 100)
W=(#SkinWidth# - #S# - 30)
H=10
BarColor=#ColorA1#
SolidColor=#ColorBG#
BarOrientation=Horizontal

; --- GPU line
[LabelGPU]
Meter=String
MeterStyle=Process
MeasureName=mGPUName
Text=GPU : %1
X=(#S# + 15)
Y=(#S# + 120)

[ValueGPU]
Meter=String
MeterStyle=Process
MeasureName=mGPUPercent
Text=%1%
StringAlign=Right
NumOfDecimals=0
X=(#SkinWidth# - #S# - 15)
Y=0r

[BarGPU]
Meter=Bar
MeasureName=mGPU
X=(#S# + 15)
Y=(#S# + 140)
W=(#SkinWidth# - #S# - 30)
H=10
BarColor=#ColorA1#
SolidColor=#ColorBG#
BarOrientation=Horizontal

; --- Optional: bottom spacing (prevents clipping)
[Spacer]
Meter=Image
H=(#S#*2)
SolidColor=0,0,0,1