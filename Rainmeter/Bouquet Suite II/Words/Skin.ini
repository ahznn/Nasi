[Rainmeter]
Update=1000
AccurateText=1
ContextTitle=Refresh Words
ContextAction=[!CommandMeasure MeasureRandomWords "Update"]
ContextTitle2=Settings
ContextAction2=[!ActivateConfig "#RootConfig#" "Settings.ini"][!Move (#CurrentConfigX#+(#S#*#SkinWidth#)+10) #CurrentConfigY# "#RootConfig#"]

[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules/Background.inc
@Include4=#@#Players/#Plugin#.inc

SkinWidth=500
SkinHeight=240

[StyleWord]
FontColor=#ColorA1#
FontFace=#Font#
FontSize=10
AntiAlias=1
StringAlign=Center

; ========== SCRIPT (local random words) ==========
[MeasureRandomWords]
Measure=Script
ScriptFile=#@#Scripts\RandomWords.lua
UpdateDivider=1
DynamicVariables=1
FinishAction=[!Redraw]

; ========== STYLES ==========
[StyleWord]
FontColor=#FontColor#
FontFace=#Font#
FontSize=20
AntiAlias=1
StringStyle=Bold

; ========== METERS (5 rows × 4 columns) ==========
; Row 1
[MeterWord1]
Meter=String
MeterStyle=StyleWord
X=100
Y=40
Text=""

