[Rainmeter]
Update       =30
AccurateText =1
ContextTitle =Settings
ContextAction =[!ActivateConfig "#RootConfig#" "Settings.ini"][!Move (#CurrentConfigX#+(#S#*#SkinWidth#)+10) #CurrentConfigY# "#RootConfig#"]

[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules/Background.inc
@Include4=#@#Players/#Plugin#.inc

; Change this to the exact number of frames you have
FrameCount=96
; File extension – usually .png or .jpg
Ext=.png
; Base name of your frame files (e.g., "frame", "img_", "output-")
BaseName=
SkinWidth =740
SkinHeight=320

[MeasureAnimator]
Measure=Calc
Formula=(MeasureAnimator + 1) % #FrameCount#
UpdateDivider=2

[ImageFrame]
Meter=Image
ImageName=#@#Frame\#BaseName#[MeasureAnimator]#Ext#
DynamicVariables=1
PreserveAspectRatio=2
W=720
H=300
X=10
Y=10
; Optional: set a fixed width (height scales automatically)
; W=300