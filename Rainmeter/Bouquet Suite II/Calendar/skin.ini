[Rainmeter]
Update=1000
AccurateText=1
ContextTitle=Settings
ContextAction=[!ActivateConfig "#RootConfig#" "Settings.ini"][!Move (#CurrentConfigX#+(#S#*#SkinWidth#)+10) #CurrentConfigY# "#RootConfig#"]

[Metadata]
Name=
Author=
Information=
License=
Version=

[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules/Background.inc
@Include4=#@#Players/#Plugin#.inc

; Appearance
FontFace=#Font#
FontSizeClock=40
FontSizeDate=70
FontSizeMonth=55
FontSizeCalendar=22
FontColor=#ColorFG#
TodayColor=#ColorA1#        ; yellow highlight

; Position
ClockX=40
ClockY=40
DateX=220
DateY=70
MonthX=125
MonthY=105
CalendarX=315
CalendarY=50
SkinWidth=605
SkinHeight=250

; ------------------------- Measures -------------------------
[MeasureHour]
Measure=Time
Format=%H

[MeasureMinute]
Measure=Time
Format=%M

[MeasureSecond]
Measure=Time
Format=%S

[MeasureDay]
Measure=Time
Format=%d

[MeasureMonth]
Measure=Time
Format=%B

; Convert today's day to two-digit (e.g., 3 -> "03")
[MeasureTodayTwoDigit]
Measure=Time
Format=%d
RegExpSubstitute=1
Substitute="^([0-9])$":"0\1"

; Lua calendar grid (no markers)
[MeasureLuaCalendar]
Measure=Script
ScriptFile=#CURRENTPATH#CalendarLua.lua
UpdateDivider=60

; ------------------------- Meters -------------------------

; Vertical time
[Clock]
Meter=String
X=#ClockX#
Y=#ClockY#
FontFace=#FontFace#
FontSize=#FontSizeClock#
FontColor=#ColorFG#
Text="[MeasureHour]#CRLF#[MeasureMinute]#CRLF#[MeasureSecond]"
DynamicVariables=1
LineSpacing=5

; Day number (big)
[DayNumber]
Meter=String
X=#DateX#
Y=#DateY#
FontFace=#FontFace#
FontSize=#FontSizeDate#
FontColor=#ColorA1#
Text="[MeasureDay]"
DynamicVariables=1

; Month name
[MonthName]
Meter=String
X=#MonthX#
Y=#MonthY#
FontFace=#FontFace#
FontSize=#FontSizeMonth#
FontColor=#FontColor#
Text="[MeasureMonth]"
DynamicVariables=1

; Calendar grid
[CalendarGrid]
Meter=String
X=#CalendarX#
Y=#CalendarY#
FontFace=#FontFace#
FontSize=#FontSizeCalendar#
FontColor=#FontColor#
Text="[&MeasureLuaCalendar]"
DynamicVariables=1
ClipString=2
ClipStringW=300

; --- Highlight today's number using word boundaries ---
; The pattern matches the exact two-digit number (e.g., \b03\b) without adding any characters
InlineSetting=Color | #TodayColor#
InlinePattern="\b[MeasureTodayTwoDigit]\b"
DynamicVariables=1
