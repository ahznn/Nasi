; ----------------------------------------- Display

[Title]
Meter=String
MeterStyle    =Process
InlineSetting5=Underline
Text =Top GPU Processes:
Y    =(#S#*12+#ShadowR#)

MouseOverAction  =[!SetOption #CurrentSection# "SolidColor" "#ColorFG#,100"][!Update]
MouseLeaveAction =[!SetOption #CurrentSection# "SolidColor" "#ColorFG#,000"][!Update]
LeftMouseUpAction=["Taskmgr.exe"]

[Process1Display]
Meter=String
MeterStyle  =Process
MeasureName =Process1
MeasureName2=Process1Calc

[Process2Display]
Meter=String
