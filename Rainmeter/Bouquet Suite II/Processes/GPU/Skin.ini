[Rainmeter]
Update        =5000
AccurateText  =1
ContextTitle  =Settings
ContextAction =[!ActivateConfig "#RootConfig#" "Settings.ini"][!Move (#CurrentConfigX#+(#S#*#SkinWidth#)+10) #CurrentConfigY# "#RootConfig#"]

; ----------------------------------------- Inclusions

[Variables]
@Include1=#@#Variables.inc
@Include2=#@#Styles.inc
@Include3=#@#Modules/Background.inc
SkinWidth =160
SkinHeight=180

; ----------------------------------------- Top Processes

[Process1]
Measure=Plugin
Plugin =UsageMonitor
Percent=1
Alias=GPU
Index=1

[Process1Calc]
Measure=Calc
Formula=Process1
OnChangeAction=[!UpdateMeter Process1Display]
IfCondition   =(#CurrentSection#<1)
IfTrueAction  =[!HideMeter Process1Display]
IfFalseAction =[!ShowMeter Process1Display]

